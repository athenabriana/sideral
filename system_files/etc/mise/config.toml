# System-wide mise defaults baked into the image.
# Per-user ~/.config/mise/config.toml and per-project .mise.toml override this.
#
# After rebase / first login, run:   mise install
# to actually download + compile these tool versions.

[tools]
# Fixed version — no symbolic alias for android-sdk
android-sdk = "13.0"

# Symbolic versions resolved at install time
bun    = "latest"
go     = "latest"
gradle = "latest"
java   = "temurin-lts"
kotlin = "latest"
node   = "lts"
python = "latest"
rust   = "stable"
uv     = "latest"
zig    = "latest"

[settings]
# Allow experimental features (some plugin types need it)
experimental = true

# Trust configs anywhere on the system — skip the interactive
# "do you trust this .mise.toml?" prompt when cd'ing into projects.
trusted_config_paths = ["/"]

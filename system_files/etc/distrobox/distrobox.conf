# athens-os — system-wide distrobox defaults.
#
# Read by every `distrobox create` invocation; settings here apply to all
# containers spawned on this host.
#
# Pairs with the home.nix bashrc snippet that sources
# /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh — together they
# give every distrobox container a fully wired nix CLI:
#
#   distrobox create --image fedora:42 dev
#   distrobox enter dev
#   $ nix --version              ← works (nix is on PATH)
#   $ nix-shell -p hyperfine     ← works (talks to host nix-daemon over socket)
#   $ mise --version             ← works (was on host's ~/.nix-profile/bin)
#
# Mounted paths:
#   /nix         — store, daemon socket (under /nix/var/nix/daemon-socket),
#                  user profiles (~/.nix-profile resolves into here)
#   /var/lib/nix — backing store for /nix's bind-mount on the host
#   /etc/nix     — nix.conf, substituters, build-users-group config
#
# Read-write so containers can `nix profile install` against the shared store.
# For read-only mode append :ro to each path (e.g. /nix:ro).

container_additional_volumes="/nix /var/lib/nix /etc/nix"

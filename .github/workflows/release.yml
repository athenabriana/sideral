name: release

# Runs after every successful image build on main. semantic-release inspects
# commits since the last tag and decides whether to cut a new version. If yes:
#   1. Build a live ISO from ghcr.io/<owner>/athens-os:latest using titanoboa
#      (the same tool Bluefin/Bazzite/Aurora use — wraps the bootc rootfs in a
#      Fedora-grub LiveCD shell, sidestepping osbuild's distro-definition
#      lookup that bootc-image-builder requires).
#   2. Compress with zstd
#   3. Hand the artifact paths to semantic-release, which creates the GitHub
#      Release (versioned tag, auto-generated notes) with the ISO + checksum
#      attached.
#
# Triggers:
#   - workflow_run from build-athens-os (success on main) — auto release loop
#   - workflow_dispatch — force a release attempt without a fresh image
#
# Versioning: any commit (feat/fix/chore/docs/ci/...) bumps at least patch.
# Breaking changes (BREAKING CHANGE: footer or `feat!:`) bump major.
# Add `(no-release)` scope to a commit (e.g. `chore(no-release): ...`) to
# explicitly skip a release for that commit.

on:
  workflow_run:
    workflows: ["build-athens-os"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "OCI image tag to bake into the ISO"
        default: "latest"
        required: false

permissions:
  contents: write   # tag + release creation
  packages: read    # ghcr.io image pull
  issues: write     # semantic-release opens issues on failure
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Cut release + publish ISO
    runs-on: ubuntu-24.04
    # Skip if the upstream image build failed; allow workflow_dispatch unconditionally.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # semantic-release needs full history + tags
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install semantic-release
        run: npm ci || npm install --no-audit --no-fund

      # ── Phase 1: decide whether to release ───────────────────────────
      - name: Dry-run semantic-release
        id: dryrun
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUT=$(npx semantic-release --dry-run 2>&1) || true
          echo "$OUT"
          # Parse semantic-release's own line: "The next release version is X.Y.Z"
          NEXT=$(printf '%s\n' "$OUT" | grep -oP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [[ -n "$NEXT" ]]; then
            echo "next_version=${NEXT}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Next release: v${NEXT}"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No release-worthy commits since last tag — skipping ISO build."
          fi

      - name: Resolve image tag
        id: tags
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          [[ -z "$TAG" ]] && TAG="latest"
          echo "owner=${OWNER}"          >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${OWNER}/athens-os:${TAG}" >> "$GITHUB_OUTPUT"
          echo "iso_name=athens-os-v${{ steps.dryrun.outputs.next_version }}-x86_64.iso" >> "$GITHUB_OUTPUT"

      # ── Phase 2: free disk + auth ────────────────────────────────────
      - name: Maximise disk space
        if: steps.dryrun.outputs.skip == 'false'
        uses: ublue-os/remove-unwanted-software@v9

      - name: Log in to ghcr.io
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ── Phase 3: build ISO with titanoboa ────────────────────────────
      # Pinned to v0.2 (commit 840217d) — same tool the ublue-os family ships.
      - name: Build live ISO with titanoboa
        id: build-iso
        if: steps.dryrun.outputs.skip == 'false'
        uses: ublue-os/titanoboa@840217d97bd0bc9a52466508c54d8dda5c5ba2fd
        with:
          image-ref: ${{ steps.tags.outputs.image_ref }}
          iso-dest: ${{ github.workspace }}/output/${{ steps.tags.outputs.iso_name }}
          compression: squashfs

      - name: Compress + checksum
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          set -euo pipefail
          cd ./output
          ls -lh
          zstd -19 --long=27 -T0 \
            "${{ steps.tags.outputs.iso_name }}" \
            -o "${{ steps.tags.outputs.iso_name }}.zst"
          rm "${{ steps.tags.outputs.iso_name }}"
          sha256sum "${{ steps.tags.outputs.iso_name }}.zst" > sha256sums.txt
          ls -lh

      # ── Phase 4: cut release with the ISO attached ───────────────────
      - name: semantic-release (real)
        if: steps.dryrun.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

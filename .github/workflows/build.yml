name: build-athens-os

# Single workflow that:
#   1. Builds the bootc OCI image with buildah
#   2. Pushes it to ghcr.io and signs it with cosign (keyless OIDC)
#   3. On push to main, runs semantic-release: if any commit since the
#      last tag earns a version bump, builds a live ISO with titanoboa,
#      compresses with zstd, and attaches it to a fresh GitHub Release.
#
# Versioning: any commit (feat/fix/chore/docs/ci/...) bumps at least
# patch. Breaking changes (BREAKING CHANGE: footer or `feat!:`) bump
# major. Add `(no-release)` scope to a commit (e.g. `chore(no-release):
# ...`) to explicitly skip a release for that commit.

on:
  push:
    branches: [main]
  schedule:
    - cron: "5 10 * * *"      # daily 10:05 UTC — picks up base image updates
  workflow_dispatch: {}
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: athens-os
  IMAGE_DESC: "Personal Fedora atomic desktop — GNOME + tiling-shell on ublue-os/silverblue-main, with curated flatpaks (Zen Browser + GUI apps), home-manager user layer (mise, vscode, CLI QoL), and a narrow RPM layer (docker-ce, dev + kernel-debug stack, fonts)."
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  # OCI artifact (separate from the bootc image) where each ISO release
  # is published. ghcr.io has no per-blob size cap, unlike GitHub
  # Releases (2 GiB), so the ~5 GiB ISO lives here as a single object.
  ISO_PACKAGE: athens-os-iso

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximise disk
        uses: ublue-os/remove-unwanted-software@v9

      # Generates tags: latest, YYYYMMDD, sha-XXXXXXX, + OCI labels
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}},enable={{is_default_branch}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository }}/main/README.md
            io.artifacthub.package.logo-url=https://avatars.githubusercontent.com/u/${{ github.repository_owner_id }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          context: ./os
          containerfiles: ./os/Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          oci: true

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        id: push
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via OIDC)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

  release:
    name: Cut release + publish ISO
    runs-on: ubuntu-24.04
    needs: build
    # Only fire on main pushes and manual dispatches — skip PRs, skip
    # the nightly base-image-rebase schedule (semantic-release would
    # find no commits anyway, but skipping saves 25 min of runner time).
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write   # tag + release creation
      packages: write   # push ISO OCI artifact to ghcr.io
      issues: write     # semantic-release opens issues on failure
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # semantic-release needs full history + tags
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install semantic-release
        run: npm ci || npm install --no-audit --no-fund

      # ── Phase 1: decide whether to release ───────────────────────────
      - name: Dry-run semantic-release
        id: dryrun
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUT=$(npx semantic-release --dry-run 2>&1) || true
          echo "$OUT"
          # Parse semantic-release's own line: "The next release version is X.Y.Z"
          NEXT=$(printf '%s\n' "$OUT" | grep -oP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [[ -n "$NEXT" ]]; then
            echo "next_version=${NEXT}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Next release: v${NEXT}"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No release-worthy commits since last tag — skipping ISO build."
          fi

      - name: Resolve image tag
        id: tags
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_ref=ghcr.io/${OWNER}/athens-os:latest" >> "$GITHUB_OUTPUT"
          echo "iso_name=athens-os-v${{ steps.dryrun.outputs.next_version }}-x86_64.iso" >> "$GITHUB_OUTPUT"

      # ── Phase 2: free disk + auth ────────────────────────────────────
      - name: Maximise disk space
        if: steps.dryrun.outputs.skip == 'false'
        uses: ublue-os/remove-unwanted-software@v9

      - name: Log in to ghcr.io
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ── Phase 3: build live ISO with titanoboa ──────────────────────
      # Pinned to v0.2 (commit 840217d). The post-rootfs hook installs
      # Anaconda into the live env so the ISO has a working "Install to
      # disk" flow — without it titanoboa produces a live-only ISO.
      #
      # iso-dest must live *outside* github.workspace. titanoboa's move
      # logic does `cd ACTION_PATH` then `realpath --relative-base=WORKSPACE`,
      # which strips workspace-internal paths to relative form, then runs
      # plain `realpath` against ACTION_PATH (wrong CWD, no output/ dir).
      # An out-of-workspace path bypasses the strip; we move it back into
      # output/ in a follow-up step.
      - name: Build live ISO with titanoboa
        id: build-iso
        if: steps.dryrun.outputs.skip == 'false'
        uses: ublue-os/titanoboa@840217d97bd0bc9a52466508c54d8dda5c5ba2fd
        with:
          image-ref: ${{ steps.tags.outputs.image_ref }}
          iso-dest: ${{ runner.temp }}/${{ steps.tags.outputs.iso_name }}
          compression: squashfs
          hook-post-rootfs: ${{ github.workspace }}/iso/anaconda-hook.sh
          flatpaks-list: ${{ github.workspace }}/iso/flatpaks.txt

      - name: Stage ISO under output/
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          mkdir -p ${{ github.workspace }}/output
          mv ${{ steps.build-iso.outputs.iso-dest }} ${{ github.workspace }}/output/${{ steps.tags.outputs.iso_name }}

      - name: Checksum ISO
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          set -euo pipefail
          cd ./output
          sha256sum "${{ steps.tags.outputs.iso_name }}" > sha256sums.txt
          ls -lh

      # ── Phase 4: cut GH release, push ISO as OCI artifact to ghcr.io ─
      # semantic-release creates the tag + changelog + release shell on
      # GitHub. The ISO itself is pushed to ghcr.io as a separate OCI
      # artifact (athens-os-iso, distinct from the athens-os bootc image)
      # because GitHub Releases caps each asset at 2 GiB. ORAS streams
      # blobs over HTTP — no Node Buffer, no runner OOM. Users pull with
      # `oras pull ghcr.io/<owner>/athens-os-iso:<tag>`.
      - name: semantic-release (real)
        if: steps.dryrun.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Install oras
        if: steps.dryrun.outputs.skip == 'false'
        uses: oras-project/setup-oras@v1

      - name: Push ISO to ghcr.io as OCI artifact
        if: steps.dryrun.outputs.skip == 'false'
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          VERSION="v${{ steps.dryrun.outputs.next_version }}"
          ISO="${{ steps.tags.outputs.iso_name }}"
          REF="ghcr.io/${OWNER}/${ISO_PACKAGE}"
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          cd ./output
          # Push under both :<version> and :latest in a single round-trip
          # by passing comma-separated tags.
          oras push \
            "${REF}:${VERSION},latest" \
            --artifact-type application/vnd.athens-os.iso.v1 \
            "${ISO}:application/x-iso9660-image" \
            "sha256sums.txt:text/plain"

      - name: Append download links to release notes
        if: steps.dryrun.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          VERSION="v${{ steps.dryrun.outputs.next_version }}"
          ISO="${{ steps.tags.outputs.iso_name }}"
          REF="ghcr.io/${OWNER}/${ISO_PACKAGE}:${VERSION}"
          gh release view "${VERSION}" --repo "${{ github.repository }}" --json body -q .body > /tmp/notes.md
          {
            echo
            echo "## Download"
            echo
            echo "The installer ISO is published as an OCI artifact on ghcr.io."
            echo "Pull with [\`oras\`](https://oras.land/) (single Go binary,"
            echo "in most distros: \`brew install oras\`, \`apt install oras\`,"
            echo "\`dnf install oras\`):"
            echo
            echo '```bash'
            echo "oras pull ${REF}"
            echo "sha256sum -c sha256sums.txt"
            echo "# flash with: sudo dd if=${ISO} of=/dev/sdX bs=4M status=progress oflag=sync"
            echo '```'
            echo
            echo "Or pull \`:latest\` for the most recent release: \`oras pull ghcr.io/${OWNER}/${ISO_PACKAGE}:latest\`"
          } >> /tmp/notes.md
          gh release edit "${VERSION}" \
            --repo "${{ github.repository }}" \
            --notes-file /tmp/notes.md

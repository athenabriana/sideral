name: build-iso

# Builds an Anaconda installer ISO from the published athens-os OCI image
# (ghcr.io/<owner>/athens-os) and publishes it to GitHub Releases.
#
# Triggers:
#   - workflow_dispatch    → manual; pick image tag, optional release tag.
#   - push tags 'v*'       → release-time build; release named after the tag.
#
# Output: athens-os-<release_tag>-x86_64.iso.zst plus sha256sums.txt, attached
# to a GitHub Release. zstd compression is used because GitHub Release assets
# are capped at 2 GiB on free tier and a raw bootc-built ISO comes in close to
# that ceiling for athens-os.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "OCI image tag to build the ISO from (latest, sha-XXXX, YYYYMMDD)"
        default: "latest"
        required: false
      release_tag:
        description: "GitHub release tag to attach the ISO to (default: iso-YYYYMMDD)"
        default: ""
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write   # softprops/action-gh-release needs this to create releases
  packages: read    # ghcr.io image pull

concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build + publish ISO
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximise disk space
        # bootc-image-builder needs ~10 GB scratch + the pulled image (~4 GB)
        # + the output ISO (~3 GB). Default runners have ~14 GB free; this
        # action clears another ~25 GB by removing dotnet/haskell/android.
        uses: ublue-os/remove-unwanted-software@v9

      - name: Resolve tags
        id: tags
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"   # ghcr requires lowercase
          if [[ "${{ github.event_name }}" == "push" ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
            [[ -z "${RELEASE_TAG}" ]] && RELEASE_TAG="iso-$(date -u +%Y%m%d)"
          fi
          IMAGE_REF="ghcr.io/${OWNER}/athens-os:${IMAGE_TAG}"
          ISO_NAME="athens-os-${RELEASE_TAG}-x86_64.iso"
          {
            echo "owner=${OWNER}"
            echo "image_tag=${IMAGE_TAG}"
            echo "release_tag=${RELEASE_TAG}"
            echo "image_ref=${IMAGE_REF}"
            echo "iso_name=${ISO_NAME}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: ${IMAGE_REF} -> Release ${RELEASE_TAG} -> ${ISO_NAME}"

      - name: Log in to ghcr.io
        # Required for pulling the athens-os image — works for both public and
        # private packages, and pre-warms the auth bootc-image-builder will use.
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull athens-os image
        run: |
          sudo podman pull "${{ steps.tags.outputs.image_ref }}"
          sudo podman image inspect "${{ steps.tags.outputs.image_ref }}" \
            --format 'Image: {{.Id}} ({{.Size}} bytes)'

      - name: Build ISO with bootc-image-builder
        # `--type anaconda-iso` produces a Fedora-Anaconda installer ISO.
        # Anaconda runs interactively at boot (language, partition, user creation).
        # We mount the host's container storage so b-i-b reuses the just-pulled image
        # without re-downloading.
        run: |
          set -euo pipefail
          mkdir -p ./output
          sudo podman run --rm --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v "$(pwd)/output":/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type anaconda-iso \
            --rootfs btrfs \
            --use-librepo=True \
            "${{ steps.tags.outputs.image_ref }}"
          # b-i-b drops the ISO at output/bootiso/install.iso
          sudo chown -R "$(id -u):$(id -g)" ./output
          mv "./output/bootiso/install.iso" "./output/${{ steps.tags.outputs.iso_name }}"
          ls -lh ./output/

      - name: Compress ISO with zstd
        # zstd -19 with long mode squeezes a 3-3.5 GB ISO down ~30-40% — enough
        # to fit GitHub's 2 GiB per-asset cap on free tier. Compression takes
        # ~3-5 min single-threaded; -T0 uses all runner cores.
        run: |
          set -euo pipefail
          cd ./output
          zstd -19 --long=27 -T0 \
            "${{ steps.tags.outputs.iso_name }}" \
            -o "${{ steps.tags.outputs.iso_name }}.zst"
          rm "${{ steps.tags.outputs.iso_name }}"
          sha256sum "${{ steps.tags.outputs.iso_name }}.zst" > sha256sums.txt
          ls -lh

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tags.outputs.release_tag }}
          name: athens-os ${{ steps.tags.outputs.release_tag }}
          body: |
            Anaconda installer ISO for athens-os, built from
            `${{ steps.tags.outputs.image_ref }}` via
            [bootc-image-builder](https://github.com/osbuild/bootc-image-builder).

            ## Usage

            ### Linux

            ```bash
            zstd -d athens-os-*.iso.zst
            sudo dd if=athens-os-*.iso of=/dev/sdX bs=4M status=progress conv=fsync oflag=direct
            sync
            ```

            ### Windows / macOS

            Decompress the `.iso.zst` (7-Zip or `zstd -d`), then write with
            **Rufus** (DD mode), **Fedora Media Writer**, or **balenaEtcher**.

            ## Verify

            ```bash
            sha256sum -c sha256sums.txt
            ```
          files: |
            output/${{ steps.tags.outputs.iso_name }}.zst
            output/sha256sums.txt
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

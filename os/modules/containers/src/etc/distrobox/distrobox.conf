# sideral — system-wide distrobox defaults.
#
# Read by every `distrobox create` invocation; settings here apply to all
# containers spawned on this host.
#
# Distrobox containers install their own tooling (no shared host store).
# To add bind mounts later, set:
#   container_additional_volumes="/path/on/host /another/path"

container_additional_volumes=""

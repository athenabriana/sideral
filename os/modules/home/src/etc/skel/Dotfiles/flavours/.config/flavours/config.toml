# flavours configuration — managed by silverfox.
# Edit here to add/remove apps. Apply with: flavours apply <scheme>
# List schemes: flavours list
# Update templates/schemes: flavours update all

[[item]]
template = "ghostty"
file = "~/.config/ghostty/config-base16"
rewrite = true

[[item]]
template = "zed"
file = "~/.config/zed/themes/base16-dark.json"
rewrite = true

[[item]]
template = "starship"
file = "~/.config/starship.toml"
start = "# ── base16 palette — generated by flavours; do not edit manually. ──"
end = "# ── end base16 palette ─────────────────────────────────────────────"
rewrite = false

[[item]]
template = "cosmic-dark"
file = "~/.config/cosmic/com.system76.CosmicTheme.Dark/v1/palette"
rewrite = true

[[item]]
template = "cosmic-dark-accent"
file = "~/.config/cosmic/com.system76.CosmicTheme.Dark/v1/accent"
rewrite = true

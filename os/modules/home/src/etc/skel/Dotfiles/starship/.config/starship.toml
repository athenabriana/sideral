palette = "base16"

# ── base16 palette — generated by flavours; do not edit manually. ──
[palettes.base16]
base00 = "#151515"
base01 = "#202020"
base02 = "#303030"
base03 = "#505050"
base04 = "#b0b0b0"
base05 = "#d0d0d0"
base06 = "#e0e0e0"
base07 = "#f5f5f5"
base08 = "#7c7c7c"
base09 = "#8e8e8e"
base0A = "#a0a0a0"
base0B = "#686868"
base0C = "#747474"
base0D = "#5e5e5e"
base0E = "#696969"
base0F = "#7a7a7a"
# ── end base16 palette ─────────────────────────────────────────────

[character]
success_symbol = "[❯](bold base0B)"
error_symbol = "[❯](bold base08)"
vimcmd_symbol = "[❮](bold base0D)"

[directory]
style = "bold base0D"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bold base0E"
symbol = " "

[git_status]
style = "base08"

[cmd_duration]
style = "base03"
min_time = 2000

[username]
style_user = "base04"
style_root = "bold base08"
show_always = false

[hostname]
style = "bold base0C"
ssh_only = true

# sideral keyd config — gives the Super key tap-vs-hold semantics so
# pressing Super alone fires F13 (which niri binds to the Noctalia
# launcher toggle), while Super+key combos behave normally as Super
# modifier. niri 25.11 has no `on-release` keybind option, so this
# kernel-level remap is the cleanest workaround until niri 26.x.
#
# Reference: https://github.com/rvaiya/keyd

[ids]
*

[main]
leftmeta = overload(meta, f13)

# sideral SDDM defaults
#
# Theme: SilentSDDM (vendored at /usr/share/sddm/themes/silent/).
# Session: niri (Wayland), via /usr/share/wayland-sessions/niri.desktop.
# Autologin lives in /etc/sddm.conf.d/autologin.conf — written by
# `ujust autologin enable` and deleted by `ujust autologin disable`.

[Theme]
Current=silent

[General]
DisplayServer=wayland

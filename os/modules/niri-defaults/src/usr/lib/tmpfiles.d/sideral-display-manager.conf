# sideral — pin /etc/systemd/system/display-manager.service to sddm.
#
# rpm-ostree preserves /etc across rebases by 3-way merge, so a stale
# symlink left over from a previous DM (greetd in 0.0.0-12, lightdm in
# theory) survives image upgrades and silently breaks boot — the boot
# either tries to start a service whose unit file no longer exists
# (greetd → "Unit not found") or runs a DM you didn't intend.
#
# `L+` recreates the symlink on every boot via systemd-tmpfiles-setup
# (replacing whatever was there). Idempotent. If you intentionally want
# a different DM, switch this file off with a higher-priority drop-in
# in /etc/tmpfiles.d/ (same filename, takes precedence).
L+  /etc/systemd/system/display-manager.service  -  -  -  -  /usr/lib/systemd/system/sddm.service

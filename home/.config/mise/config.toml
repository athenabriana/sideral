# User-level mise toolchain — shipped via /etc/skel to every new user,
# pulled onto an existing user with `just apply-home`.
# Per-project .mise.toml files override this.
#
# After rebase / first login:   mise install    (or: just mise-setup)

[tools]
# Fixed version — no symbolic alias for android-sdk
android-sdk = "13.0"

# Symbolic versions resolved at install time
bun    = "latest"
go     = "latest"
gradle = "latest"
java   = "temurin-lts"
kotlin = "latest"
node   = "lts"
python = "latest"
rust   = "stable"
uv     = "latest"
zig    = "latest"

[settings]
# Allow experimental features (some plugin types need it)
experimental = true

# Trust configs anywhere on the system — skip the interactive
# "do you trust this .mise.toml?" prompt when cd'ing into projects.
trusted_config_paths = ["/"]

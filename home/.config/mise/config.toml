# User-level mise toolchain — shipped via /etc/skel to every new user.
# Per-project .mise.toml files override this.
#
# This file declares PREFERRED versions. Tools are installed lazily:
#   • First use of `node` / `python` / etc. auto-installs that tool
#   • Tools you never touch never download
#   • Run plain `mise install` to eagerly install everything declared here

[tools]

# ── JavaScript / TypeScript ───────────────────────────────────
node = "lts"
bun  = "latest"
pnpm = "latest"

# ── Python ────────────────────────────────────────────────────
python = "latest"
uv     = "latest"

# ── JVM ecosystem ─────────────────────────────────────────────
java   = "temurin-lts"
kotlin = "latest"
gradle = "latest"

# ── Systems languages ─────────────────────────────────────────
go   = "latest"
rust = "stable"
zig  = "latest"

# ── Mobile ────────────────────────────────────────────────────
android-sdk = "13.0"

# ── Shell / dev UX (pre-installed by athens-mise-install.service) ──
atuin  = "latest"   # shell history with Ctrl+R fuzzy search, syncs via shared HOME
direnv = "latest"   # per-project env-var autoloader on cd

# ── CI / automation ───────────────────────────────────────────
act = "latest"      # run GitHub Actions workflows locally

[settings]

# Allow experimental plugins
experimental = true

# No "do you trust this .mise.toml?" prompt when cd'ing into projects
trusted_config_paths = ["/"]

# Auto-install tools on first use (not eagerly on shell activation)
not_found_auto_install = true

# Respect legacy version files in cloned repos
# (.nvmrc / .python-version / .ruby-version / .java-version / .go-version)
idiomatic_version_file_enable_tools = ["node", "python", "java", "ruby", "go", "rust"]

# Faster parallel installs on modern CPUs
jobs = 8

# Safety margin for slow networks (default 30s trips on big archives)
http_timeout = "60s"

# Quieter cd-into-project warnings: only if a DIFFERENT version is already installed
[settings.status]
missing_tools = "if_other_versions_installed"
show_env      = false
show_tools    = false

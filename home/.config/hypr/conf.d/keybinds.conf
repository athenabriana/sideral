$mainMod = SUPER

$terminal    = kitty
$fileManager = nautilus
$menu        = rofi -show drun
$windowMenu  = rofi -show window
$powerMenu   = wlogout -b 3 -c 10 -r 10 -m 400
$settings    = gnome-control-center
$lock        = hyprlock

# --- Apps (COSMIC-style) -------------------------------------------------
bind  = $mainMod,       Q,       killactive,
bind  = $mainMod,       F5,      exec, ~/.config/hypr/scripts/refresh.sh    # refresh desktop
bindr = $mainMod,       SUPER_L, exec, pkill -x rofi || rofi -show drun    # tap Super alone → launcher
bind  = $mainMod,       slash,   exec, $menu
bind  = $mainMod,       space,   exec, $windowMenu
bind = $mainMod,       T,      exec, $terminal
bind = $mainMod,       F,      exec, $fileManager
bind = $mainMod,       I,      exec, $settings
bind = $mainMod,       escape, exec, $lock
bind = $mainMod,       N,      exec, swaync-client -t -sw
bind = $mainMod,       V,      exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = CTRL ALT,       V,      exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod,       B,      exec, ags toggle -i bar Bar
bind = $mainMod SHIFT, E,      exec, $powerMenu
bind = $mainMod SHIFT, M,      exit,

# Screenshots
bind = ,           Print, exec, ~/.config/hypr/scripts/screenshot.sh menu
bind = $mainMod,   Print, exec, ~/.config/hypr/scripts/screenshot.sh region
bind = SHIFT,      Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = CTRL,       Print, exec, ~/.config/hypr/scripts/screenshot.sh region-edit

# --- Window state (COSMIC-style) ----------------------------------------
bind = $mainMod,       G,      togglefloating,
bind = $mainMod,       M,      fullscreen, 1            # maximize (keep gaps)
bind = $mainMod SHIFT, F,      fullscreen, 0            # true fullscreen
bind = $mainMod,       O,      togglesplit,             # toggle tile orientation
bind = $mainMod,       Y,      pseudo,                  # pseudotile

# --- Focus (arrows) ------------------------------------------------------
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Move window in tile (Shift + arrows) -------------------------------
bind = $mainMod SHIFT, left,  swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up,    swapwindow, u
bind = $mainMod SHIFT, down,  swapwindow, d

# --- Resize tile (Ctrl + arrows) ----------------------------------------
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive,  40 0
binde = $mainMod CTRL, up,    resizeactive,  0 -40
binde = $mainMod CTRL, down,  resizeactive,  0  40

# --- Workspaces: vertical (COSMIC) --------------------------------------
bind = $mainMod CTRL,       up,   workspace, e-1
bind = $mainMod CTRL,       down, workspace, e+1
bind = $mainMod CTRL,       home, workspace, 1
bind = $mainMod CTRL,       end,  workspace, 10
bind = $mainMod CTRL SHIFT, up,   movetoworkspace, e-1
bind = $mainMod CTRL SHIFT, down, movetoworkspace, e+1

# --- Workspaces: numbered (kept for convenience) ------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

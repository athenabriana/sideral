# HyprPanel bundles its own notification daemon, network/bluetooth menus,
# and volume/media widgets — so swaync, nm-applet, and blueman-applet are
# no longer needed. cliphist watchers stay (clipboard history source).

exec-once = sh -c 'mkdir -p ~/.local/state; ags run ~/.config/ags > ~/.local/state/ags.log 2>&1'
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent.service
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# hyprlock — lock screen

general {
    hide_cursor = true
    grace = 2
    disable_loading_bar = true
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/solid-gray.png
    blur_passes = 0
    brightness = 0.9
}

input-field {
    monitor =
    size = 320, 56
    position = 0, -100
    halign = center
    valign = center

    outline_thickness = 2
    outer_color = rgba(255, 140, 0, 0.9)
    inner_color = rgba(43, 43, 43, 0.85)
    font_color  = rgb(238, 238, 238)
    check_color = rgba(255, 140, 0, 0.95)
    fail_color  = rgba(200, 80, 80, 0.9)

    rounding = 14
    dots_size = 0.28
    dots_spacing = 0.4
    fade_on_empty = true

    placeholder_text = <i>Password…</i>
    hide_input = false
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(238, 238, 238, 0.95)
    font_size = 96
    font_family = Source Serif 4
    position = 0, 180
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(238, 238, 238, 0.8)
    font_size = 22
    font_family = Source Serif 4
    position = 0, 90
    halign = center
    valign = center
}

# User greeting
label {
    monitor =
    text = Hello, $USER
    color = rgba(255, 255, 255, 0.95)
    font_size = 18
    font_family = Source Serif 4
    position = 0, -40
    halign = center
    valign = center
}

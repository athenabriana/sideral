# sideral nvidia modprobe options — ships to /usr/lib/modprobe.d/ (NOT
# /etc/modprobe.d/) per atomic-image immutability convention.
#
# NVreg_PreserveVideoMemoryAllocations=1 — persist VRAM across suspend/
#   hibernate; without this, compositor surfaces corrupt on resume.
#   Source: NVIDIA driver README powermanagement.html.
# NVreg_TemporaryFilePath=/var/tmp — default /tmp is tmpfs; large VRAM
#   pools overflow it during hibernate.
# NVreg_EnableGpuFirmware=1 — GSP firmware; defensive default-on.
# NVreg_DynamicPowerManagement=0x02 — Optimus laptop fine-grained Runtime
#   D3 power management; harmless on desktops.

options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_TemporaryFilePath=/var/tmp
options nvidia NVreg_EnableGpuFirmware=1
options nvidia NVreg_DynamicPowerManagement=0x02

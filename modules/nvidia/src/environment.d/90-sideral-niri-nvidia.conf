# Wayland + NVIDIA env vars — ships to /usr/lib/environment.d/ so they
# apply to both login shells and graphical sessions without shell dependency.
#
# __GL_GSYNC_ALLOWED / __GL_VRR_ALLOWED — Wayland G-Sync/VRR plumbing.
# LIBVA_DRIVER_NAME=nvidia — VAAPI hardware decode via libva-nvidia-driver.
# NVD_BACKEND=direct — EGL backend broken since driver 525; direct is stable.
# MOZ_DISABLE_RDD_SANDBOX=1 — Firefox/Zen RDD process needs unsandboxed
#   access to the NVDEC ioctl for hardware video decode.
#   Source: bazzite system_files/desktop/shared/usr/libexec/bazzite-flatpak-manager.
# Note: WLR_NO_HARDWARE_CURSORS=1 is NOT shipped — niri is not wlroots-based;
#   the variable is ignored. The cursor-plane workaround goes in niri config.d.

__GL_GSYNC_ALLOWED=1
__GL_VRR_ALLOWED=1
LIBVA_DRIVER_NAME=nvidia
NVD_BACKEND=direct
MOZ_DISABLE_RDD_SANDBOX=1
